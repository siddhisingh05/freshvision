{% extends "base.html" %}
{% block title %}Verify Answer — FreshVision AI{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h3 style="font-weight:800; letter-spacing:-0.02em;">Verify recovery answer</h3>
      <p style="color:var(--muted); font-size:0.9rem;">Answer the question for <strong>{{ username }}</strong></p>
    </div>

    <div class="mb-3 p-3" style="background:rgba(255,255,255,0.3); border-radius:8px; border:1px solid rgba(95, 158, 160, 0.18);">
      <p class="mb-0" style="font-size:0.85rem; color:var(--muted);">Recovery question</p>
      <p class="mb-0" style="font-weight:600;">{{ question }}</p>
    </div>

    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Answer</label>
        <input type="text" name="security_answer" class="form-control" placeholder="type your answer" required autofocus />
      </div>
      <button type="submit" class="btn btn-primary w-100">Verify Answer</button>
    </form>
  </div>
</div>
{% endblock %}

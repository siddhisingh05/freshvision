{% extends "base.html" %}
{% block title %}Register — FreshVision AI{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h3 style="font-weight:800; letter-spacing:-0.02em;">Create account</h3>
      <p style="color:var(--muted); font-size:0.9rem;">Start classifying food freshness instantly</p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="choose a username" required autofocus minlength="3" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="min 6 characters" required minlength="6" />
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="repeat password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>

    <p class="text-center mt-3 mb-0" style="font-size:0.88rem; color:var(--muted);">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

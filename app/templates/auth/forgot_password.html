{% extends "base.html" %}
{% block title %}Forgot Password — FreshVision AI{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h3 style="font-weight:800; letter-spacing:-0.02em;">Forgot password</h3>
      <p style="color:var(--muted); font-size:0.9rem;">Enter your username to recover your account</p>
    </div>

    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="your username" required autofocus />
      </div>
      <button type="submit" class="btn btn-primary w-100">Continue</button>
    </form>

    <p class="text-center mt-3 mb-0" style="font-size:0.88rem; color:var(--muted);">
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}

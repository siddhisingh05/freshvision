{% extends "base.html" %}
{% block title %}Reset Password — FreshVision AI{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h3 style="font-weight:800; letter-spacing:-0.02em;">Reset password</h3>
      <p style="color:var(--muted); font-size:0.9rem;">Create a new password for your account</p>
    </div>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" placeholder="min 6 characters" required autofocus minlength="6" />
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="repeat password" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary w-100">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
